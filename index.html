<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Online Coding Workspace</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
background:#0d1117;
color:#e6edf3;
font-family:Segoe UI;
display:flex;
flex-direction:column;
height:100vh;
}

header{
height:55px;
background:#161b22;
display:flex;
align-items:center;
padding:0 20px;
font-size:20px;
border-bottom:1px solid #30363d;
}

#topbar{
display:flex;
gap:10px;
padding:10px;
background:#0d1117;
border-bottom:1px solid #30363d;
}

button{
background:#21262d;
border:1px solid #30363d;
color:white;
padding:6px 12px;
cursor:pointer;
}

button:hover{
background:#30363d;
}

#fileTabs{
display:flex;
gap:3px;
padding:5px;
background:#161b22;
border-bottom:1px solid #30363d;
overflow-x:auto;
}

.tab{
padding:6px 10px;
background:#21262d;
border:1px solid #30363d;
cursor:pointer;
display:flex;
align-items:center;
gap:6px;
}

.tab.active{
background:#238636;
}

.tab span{
cursor:pointer;
color:#ff7b72;
}

#editor{
flex:1;
}

#codeArea{
width:100%;
height:100%;
background:#0d1117;
color:#e6edf3;
border:none;
outline:none;
resize:none;
font-family:monospace;
font-size:14px;
padding:20px;
}

</style>

</head>

<body>

<header>
Collaborative Coding Workspace
</header>

<div id="topbar">

<button onclick="createFile()">New File</button>

<button onclick="renameFile()">Rename File</button>

<button onclick="downloadFile()">Download File</button>

<button onclick="downloadProject()">Download Project ZIP</button>

</div>

<div id="fileTabs"></div>

<div id="editor">

<textarea id="codeArea"></textarea>

</div>

<script>

let files={
"index.html":"<!DOCTYPE html>\n<html>\n<head>\n<title>Project</title>\n</head>\n<body>\n\n</body>\n</html>"
}

let currentFile="index.html"


function renderTabs(){

let container=document.getElementById("fileTabs")

container.innerHTML=""

for(let name in files){

let tab=document.createElement("div")

tab.className="tab"

if(name===currentFile){
tab.classList.add("active")
}

tab.onclick=()=>openFile(name)

let label=document.createElement("div")
label.textContent=name

let close=document.createElement("span")
close.textContent="×"

close.onclick=(e)=>{
e.stopPropagation()
delete files[name]

let keys=Object.keys(files)

currentFile=keys[0]||""

if(currentFile){
openFile(currentFile)
}

renderTabs()
}

tab.appendChild(label)
tab.appendChild(close)

container.appendChild(tab)

}

}


function openFile(name){

saveCurrent()

currentFile=name

document.getElementById("codeArea").value=files[name]

renderTabs()

}


function saveCurrent(){

files[currentFile]=document.getElementById("codeArea").value

}


function createFile(){

let name=prompt("File name")

if(!name) return

if(files[name]){
alert("File already exists")
return
}

files[name]=""

currentFile=name

renderTabs()

openFile(name)

}


function renameFile(){

let newName=prompt("New file name",currentFile)

if(!newName) return

if(files[newName]){
alert("File exists")
return
}

files[newName]=files[currentFile]

delete files[currentFile]

currentFile=newName

renderTabs()

}


function downloadFile(){

saveCurrent()

let blob=new Blob([files[currentFile]],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=currentFile

a.click()

}


async function downloadProject(){

saveCurrent()

let zip=new JSZip()

for(let name in files){

zip.file(name,files[name])

}

let content=await zip.generateAsync({type:"blob"})

let a=document.createElement("a")

a.href=URL.createObjectURL(content)

a.download="project.zip"

a.click()

}


document.getElementById("codeArea").addEventListener("input",saveCurrent)


window.onload=()=>{

renderTabs()

openFile("index.html")

}

</script>

</body>
</html>
